<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>BlueTape Fitness</title>
<meta name="description" content="Home training, running, nutrition, and AI coaching for body recomposition." />
<meta name="theme-color" content="#12161C" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="BlueTape" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #12161C; overscroll-behavior-y: contain; }
  #root { min-height: 100vh; }
  #boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #12161C; gap: 14px; }
  #boot .mark { width: 56px; height: 20px; background: #3E7CB1; border-radius: 3px; transform: rotate(-8deg); animation: pulseTape 1.3s ease-in-out infinite; }
  #boot .label { color: #7C8894; font-family: sans-serif; letter-spacing: 0.15em; font-size: 12px; }
  @keyframes pulseTape { 0%, 100% { opacity: 0.45; transform: rotate(-8deg) scaleX(0.85); } 50% { opacity: 1; transform: rotate(-8deg) scaleX(1); } }
</style>
</head>
<body>
<div id="root"><div id="boot"><div class="mark"></div><div class="label">LOADING BLUETAPE…</div></div></div>
<script src="bundle.js"></script>
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("service-worker.js").catch(() => {});
    });
  }
</script>
</body>
</html>
